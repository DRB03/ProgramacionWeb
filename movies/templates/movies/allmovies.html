{% extends "movies/base.html" %}

{% block content %}
<div class="container mx-auto px-5 py-2 lg:px-32 lg:pt-12">
  <div id="artworks-container" class="-m-1 flex flex-wrap md:-m-2">
    
    {% if objetos %}
        {% for obj in objetos %}  
        <div class="flex w-1/4 flex-wrap pt-3">
          <div class="w-full p-1 md:p-2">
            <img
              class="block h-full w-full rounded-lg object-cover object-center"
              src="https://image.tmdb.org/t/p/w600_and_h900_bestv2/{{obj.poster_path}}" alt="{{obj.title}}" />
          </div>
          <div class=" -m-1 h-10 mt-1 mb-5 "> 
            <a href="/movies/{{obj.id}}" class="block overflow-hidden text-ellipsis pl-5 text-sky-600 font-bold"> {{obj.title|truncatechars_html:40}}  </a>
            <a href="#" class="block pl-5"> 
                <span class="text-gray-400 text-sm font-thin"> {{obj.release_date}} </span> 
            </a>
          </div>
        </div>
        {% endfor %} 
    {% else %}
        <div class="w-full text-center mt-10">
            <p class="text-gray-600 text-lg">No hay películas disponibles en esta sección.</p>
        </div>
    {% endif %}

  </div>
</div>
{% endblock content %}
