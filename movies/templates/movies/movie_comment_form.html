{% extends "movies/base.html" %}

{% block content %}
<div class="flex flex-col w-full md:w-2/3 lg:w-1/2 mx-auto mt-10 mb-8 px-4">
  
  <h2 class="text-2xl font-bold mb-6 text-gray-900 dark:text-gray-100">
    Agregar Comentario
  </h2>

  <div class="bg-white dark:bg-slate-800 shadow rounded-lg p-6 md:p-8">
    <form action="/movies/movie_comment/add/{{movie.id}}/" method="post">
      {% csrf_token %}
      
      <div class="text-gray-800 dark:text-gray-200">
        {{ form }}
      </div>
      
      <div class="mt-8 flex items-center justify-end gap-x-6">
        <button type="button" onclick="history.back()" class="text-sm font-semibold leading-6 text-gray-900 dark:text-gray-300 hover:text-gray-600 dark:hover:text-white transition-colors">
          Cancelar
        </button>

        <button type="submit" class="rounded-md bg-indigo-600 px-5 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 dark:bg-indigo-500 dark:hover:bg-indigo-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-colors">
          Guardar
        </button>
      </div>
    </form>
  </div>
  
</div>
{% endblock content %}
